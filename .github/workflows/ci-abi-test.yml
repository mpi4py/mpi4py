name: ci-abi-test

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - refactor/mpiabi-DISABLED

permissions:
  contents: read

jobs:

  abi:
    uses: ./.github/workflows/ci-abi.yml
    with:
      platform: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - Linux-aarch64
          - Linux-x86_64
          - macOS-arm64
          - macOS-x86_64
