name: ci-cover

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      py:
        description: 'Python version'
        required: false
        default: 3
        type: string
  workflow_dispatch:
    inputs:
      py:
        description: 'Python version'
        required: true
        default: 3
        type: string

permissions:
  contents: read

env:
  MPI4PY_COVERAGE_PLUGIN: cycoverage
  PYTHONPATH: ${{ github.workspace }}/conf

jobs:

  cover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        mpi:
          - mpich
          - openmpi
        py:
          - ${{ github.event.inputs.py || 3 }}
    defaults:
      run:
        shell: bash -el {0}

    steps:

    - uses: actions/checkout@v7
      with:
        persist-credentials: false

    - uses: actions/setup-python@v6.3.0
      with:
        python-version: ${{ matrix.py }}
        cache: pip
    - run: python -m pip install
           --group build
           --group cover
           ${{ matrix.mpi }}

    - run: python -m pip install .
      env:
        CFLAGS: -O0
        CPPFLAGS: -O0 -Wp,-U_FORTIFY_SOURCE
        PIP_VERBOSE: 3
        PIP_NO_CACHE_DIR: true
        PIP_NO_BUILD_ISOLATION: false  # pypa/pip#5735
        PIP_DISABLE_PIP_VERSION_CHECK: true

    - name: Tweak MPI
      run:  awk 'NF' .ci/env.${{ matrix.mpi }} >> "$GITHUB_ENV"
      shell: bash

    - name: Run coverage
      run:  test/coverage.sh

    - name: Prepare coverage data
      run:  mv .coverage .coverage."${TAG}"
      env:
        TAG: ${{ runner.os }}.${{ matrix.mpi }}.py${{ matrix.py }}

    - name: Upload coverage data
      uses: actions/upload-artifact@v7
      with:
        name: coverage-data-${{ runner.os }}-${{ matrix.mpi }}-${{ matrix.py }}
        path: ".coverage.*"
        if-no-files-found: ignore
        include-hidden-files: true

  report:
    runs-on: ubuntu-latest
    needs: cover
    if: always()

    steps:

    - uses: actions/checkout@v7
      with:
        persist-credentials: false

    - uses: actions/setup-python@v6.3.0
      with:
        python-version: ${{ github.event.inputs.py || 3 }}
        cache: pip
    - run: python -m pip install
           --group build-cython
           coverage

    - run: python conf/cythonize.py

    - name: Download coverage data
      uses: actions/download-artifact@v8
      with:
        pattern: coverage-data-*
        merge-multiple: true

    - name: Report coverage
      run: |
        python -m coverage combine
        python -m coverage html
        python -m coverage xml
        python -m coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"
        python -m coverage report --fail-under=100

    - name: Upload HTML report
      uses: actions/upload-artifact@v7
      with:
        name: coverage-html
        path: htmlcov
      if: failure()
